<!DOCTYPE html>
<html lang="ms" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Akaun - ATS Resume Builder</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f7ff',
                            100: '#e0effe',
                            200: '#bae0fd',
                            300: '#7cc8fc',
                            400: '#38acf8',
                            500: '#0e91e9',
                            600: '#0273c7',
                            700: '#035ca2',
                            800: '#074e85',
                            900: '#0c426e',
                            950: '#082a4a',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="static/style.css">
    <!-- Auth script logic -->
    <script src="static/auth.js"></script>
</head>
<body class="flex flex-col min-h-screen font-sans antialiased text-slate-200">
    
    <!-- Navigation Bar -->
    <header class="sticky top-0 z-40 w-full border-b border-slate-800 bg-slate-900/80 backdrop-blur-md transition-all duration-300 no-print">
        <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
            <div class="flex items-center gap-3">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-tr from-brand-600 to-indigo-600 shadow-lg shadow-brand-500/20">
                        <svg class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <span class="font-outfit text-xl font-bold tracking-tight text-white">ATS<span class="bg-gradient-to-r from-brand-400 to-indigo-400 bg-clip-text text-transparent">Resume</span></span>
                </a>
            </div>
            
            <nav id="navbar-links" class="flex items-center gap-4">
                <!-- Dijana secara dinamik oleh auth.js -->
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative overflow-hidden">
        <!-- Glowing background blur -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -z-10 h-72 w-72 rounded-full bg-brand-500/10 blur-3xl"></div>
        
        <div class="sm:mx-auto w-full max-w-md">
            <h2 class="text-center font-outfit text-3xl font-extrabold tracking-tight text-white">
                Daftar Akaun Baru
            </h2>
            <p class="mt-2 text-center text-sm text-slate-400">
                Dah ada akaun?
                <a href="login.html" class="font-semibold text-brand-400 hover:text-brand-300 transition">
                    log masuk di sini
                </a>
            </p>
        </div>

        <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
            <div class="border border-slate-800 bg-slate-900/60 backdrop-blur-md px-6 py-8 shadow-xl rounded-2xl sm:px-10">
                
                <!-- Alert Box -->
                <div id="alert-box" class="hidden mb-6 flex items-center gap-3 rounded-xl p-4 text-sm bg-rose-500/10 border border-rose-500/20 text-rose-400">
                    <svg class="h-5 w-5 shrink-0" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
                    </svg>
                    <span id="alert-text">Sila isi semua ruangan wajib!</span>
                </div>

                <form class="space-y-6" id="register-form">
                    <div>
                        <label for="username" class="block text-sm font-medium text-slate-300">
                            Nama Pengguna
                        </label>
                        <div class="mt-1">
                            <input id="username" type="text" required
                                class="block w-full rounded-xl border border-slate-700 bg-slate-800/80 px-4 py-3 text-white placeholder-slate-500 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500 text-sm transition">
                        </div>
                    </div>

                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-300">
                            Alamat E-mel
                        </label>
                        <div class="mt-1">
                            <input id="email" type="email" required
                                class="block w-full rounded-xl border border-slate-700 bg-slate-800/80 px-4 py-3 text-white placeholder-slate-500 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500 text-sm transition">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-300">
                            Kata Laluan
                        </label>
                        <div class="mt-1">
                            <input id="password" type="password" required
                                class="block w-full rounded-xl border border-slate-700 bg-slate-800/80 px-4 py-3 text-white placeholder-slate-500 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500 text-sm transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-2">
                            Peranan Akaun (Demo Role Selection)
                        </label>
                        <div class="grid grid-cols-2 gap-4">
                            <label class="relative flex cursor-pointer rounded-xl border border-brand-500 ring-2 ring-brand-500/20 bg-slate-800/50 p-4 shadow-sm focus:outline-none transition">
                                <input type="radio" name="role" value="user" checked class="sr-only" id="role-user">
                                <div class="flex flex-col">
                                    <span id="user-label" class="block text-sm font-bold text-white">User</span>
                                    <span id="user-desc" class="mt-1 flex items-center text-xs text-slate-400">Bina resume anda</span>
                                </div>
                            </label>
                            <label class="relative flex cursor-pointer rounded-xl border border-slate-700 bg-slate-800/50 p-4 shadow-sm focus:outline-none hover:border-slate-600 transition">
                                <input type="radio" name="role" value="admin" class="sr-only" id="role-admin">
                                <div class="flex flex-col">
                                    <span id="admin-label" class="block text-sm font-bold text-white">Admin</span>
                                    <span id="admin-desc" class="mt-1 flex items-center text-xs text-slate-400">Uruskan semua resume</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div>
                        <button type="submit"
                            class="flex w-full justify-center rounded-xl bg-gradient-to-r from-brand-600 to-indigo-600 px-4 py-3.5 text-sm font-semibold text-white shadow-lg shadow-brand-500/10 hover:from-brand-500 hover:to-indigo-500 hover:shadow-brand-500/20 transition">
                            Daftar Akaun
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-900 bg-slate-950 py-6 text-center text-xs text-slate-500 no-print">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <p>&copy; 2026 ATS Resume Builder. Dibina secara pintar untuk memaksimumkan peluang kerjaya anda.</p>
        </div>
    </footer>

    <script>
        // Redirect if already logged in
        const currentUser = getCurrentUser();
        if (currentUser) {
            window.location.href = currentUser.role === 'admin' ? 'admin.html' : 'dashboard.html';
        }

        // Toggle UI Border Effect on Radio selection
        const roleUser = document.getElementById('role-user');
        const roleAdmin = document.getElementById('role-admin');
        
        function updateBorders() {
            const userContainer = roleUser.closest('label');
            const adminContainer = roleAdmin.closest('label');
            
            if (roleUser.checked) {
                userContainer.className = 'relative flex cursor-pointer rounded-xl border border-brand-500 ring-2 ring-brand-500/20 bg-slate-800/50 p-4 shadow-sm focus:outline-none transition';
                adminContainer.className = 'relative flex cursor-pointer rounded-xl border border-slate-700 bg-slate-800/50 p-4 shadow-sm focus:outline-none hover:border-slate-600 transition';
            } else {
                adminContainer.className = 'relative flex cursor-pointer rounded-xl border border-brand-500 ring-2 ring-brand-500/20 bg-slate-800/50 p-4 shadow-sm focus:outline-none transition';
                userContainer.className = 'relative flex cursor-pointer rounded-xl border border-slate-700 bg-slate-800/50 p-4 shadow-sm focus:outline-none hover:border-slate-600 transition';
            }
        }
        
        roleUser.addEventListener('change', updateBorders);
        roleAdmin.addEventListener('change', updateBorders);

        // Form Submit handler
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim().toLowerCase();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const role = document.querySelector('input[name="role"]:checked').value;
            const alertBox = document.getElementById('alert-box');
            const alertText = document.getElementById('alert-text');

            if (!username || !email || !password) {
                alertText.innerText = 'Sila isi semua ruangan wajib!';
                alertBox.className = 'mb-6 flex items-center gap-3 rounded-xl p-4 text-sm bg-rose-500/10 border border-rose-500/20 text-rose-400';
                return;
            }

            const users = JSON.parse(localStorage.getItem('static_users') || '[]');
            
            // Check if username/email already registered
            const exists = users.some(u => u.username === username || u.email === email);
            if (exists) {
                alertText.innerText = 'Nama pengguna atau e-mel sudah berdaftar!';
                alertBox.className = 'mb-6 flex items-center gap-3 rounded-xl p-4 text-sm bg-rose-500/10 border border-rose-500/20 text-rose-400';
                return;
            }

            // Create new user object
            const newId = (Date.now() + Math.floor(Math.random() * 1000)).toString();
            const newUser = {
                id: newId,
                username: username,
                email: email,
                password: password,
                role: role
            };

            users.push(newUser);
            localStorage.setItem('static_users', JSON.stringify(users));

            // Set up blank resume draft for normal user
            if (role === 'user') {
                const emptyResume = {
                    id: newId,
                    user_id: newId,
                    nama_penuh: "",
                    alamat: "",
                    no_ic: "",
                    email: "",
                    no_telefon: "",
                    pendidikan: [],
                    pengalaman_kerja: [],
                    sijil: [],
                    ulasan: "",
                    kemahiran: "",
                    bahasa: "",
                    portfolio: "",
                    gambar_base64: ""
                };
                localStorage.setItem('resume_' + newId, JSON.stringify(emptyResume));
            }

            // Show success message and redirect
            alertText.innerText = 'Pendaftaran berjaya! Sila log masuk.';
            alertBox.className = 'mb-6 flex items-center gap-3 rounded-xl p-4 text-sm bg-emerald-500/10 border border-emerald-500/20 text-emerald-400';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });
    </script>
</body>
</html>
